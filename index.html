<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow Analyser</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header id="app-header">
    <div class="header-left">
      <h1>Cashflow Analyser</h1>
    </div>
    <div class="header-right">
      <label class="file-btn" title="Selecteer één of meerdere CSV-bestanden">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV laden
        <input type="file" id="file-input" accept=".csv" multiple hidden>
      </label>
    </div>
  </header>

  <!-- ERROR BANNER -->
  <div id="error-banner" class="error-banner" hidden></div>

  <!-- NAVIGATION BREADCRUMB + BACK BUTTON -->
  <nav id="app-nav" hidden>
    <button id="btn-back" class="btn-back" hidden>← Terug</button>
    <span id="nav-breadcrumb"></span>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="app-main">

    <!-- MULTI-YEAR VIEW -->
    <section id="view-multiyear" class="view" hidden>
      <div class="chart-container">
        <canvas id="chart-multiyear"></canvas>
      </div>
      <p class="chart-hint">Klik op een jaar voor het maandoverzicht</p>
    </section>

    <!-- YEAR VIEW -->
    <section id="view-year" class="view" hidden>
      <div class="chart-container">
        <canvas id="chart-year"></canvas>
      </div>
      <p class="chart-hint">Klik op een maand voor het detail</p>
    </section>

    <!-- MONTH DETAIL VIEW -->
    <section id="view-month" class="view" hidden>
      <div id="net-balance-bar"></div>
      <div class="threshold-bar">
        <label for="threshold-input">Drempel bijzondere uitgaven:</label>
        <span class="threshold-prefix">€</span>
        <input type="number" id="threshold-input" value="200" min="0" step="10">
      </div>
      <div class="card-grid" id="card-grid">
        <div id="card-bijzonder"  class="card card-wide"></div>
        <div id="card-inkomsten"  class="card"></div>
        <div id="card-vaste"      class="card"></div>
        <div id="card-eenmalig"   class="card"></div>
        <div id="card-sparen"     class="card"></div>
      </div>
    </section>

  </main>

  <!-- Scripts — loaded in dependency order, plain <script src> for file:// compatibility -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Optional: embed default data locally (not committed to git) -->
  <script src="js/default-data.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/analyser.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
